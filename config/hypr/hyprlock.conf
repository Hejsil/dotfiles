general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    ignore_empty_input = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(80, 80, 80)
    inner_color = rgb(20, 20, 20)
    font_color = rgb(220, 220, 220)
    font_family = monospace
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgb(60, 120, 230)
    fail_color = rgb(240, 50, 50)
    fail_text = <i>$ATTEMPTS failed</i>
    capslock_color = rgb(200, 130, 30)
    position = 0, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000]echo "$(date '+%H:%M')"
    color = rgb(220, 220, 220)
    font_size = 90
    font_family = monospace
    position = 0, 300
    halign = center
    valign = top
}

label {
    monitor =
    text = $USER
    color = rgb(150, 150, 150)
    font_size = 20
    font_family = monospace
    position = 0, 240
    halign = center
    valign = top
}
